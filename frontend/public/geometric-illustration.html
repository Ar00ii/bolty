<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometric Illustration</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Roboto Mono', monospace;
  }
  .container {
    position: relative;
    width: 600px;
    height: 600px;
    background: #fafafa;
    overflow: hidden;
  }
  .dot-grid {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 1px 1px, rgba(0,0,0,0.1) 0.75px, transparent 0.75px);
    background-size: 20px 20px;
  }
  .svg-layer {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  svg.main { width: 400px; height: 400px; }

  .dashed-1 {
    stroke-dasharray: 15 8;
    animation: dash1 3s linear infinite;
  }
  .dashed-2 {
    stroke-dasharray: 15 8;
    animation: dash2 3.5s linear infinite;
  }
  @keyframes dash1 {
    0% { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: -46; }
  }
  @keyframes dash2 {
    0% { stroke-dashoffset: 0; }
    100% { stroke-dashoffset: 46; }
  }

  .label {
    position: absolute;
    font-family: 'Roboto Mono', monospace;
    font-size: 9px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    z-index: 3;
  }
  .l-num  { top: 50px; right: 50px; }
  .l-name { bottom: 50px; left: 50px; }
</style>
</head>
<body>

<div class="container">
  <div class="dot-grid"></div>
  <div class="label l-num">// 001</div>
  <div class="label l-name">// performance</div>

  <div class="svg-layer">
    <svg class="main" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="bf">
          <feGaussianBlur in="SourceGraphic" stdDeviation="35"/>
        </filter>
      </defs>

      <!-- Color blobs -->
      <g filter="url(#bf)" opacity="0.5">
        <circle cx="220" cy="140" r="70" fill="rgb(120,80,200)"/>
        <circle cx="140" cy="260" r="65" fill="rgb(220,220,60)"/>
        <circle cx="270" cy="260" r="70" fill="rgb(100,200,255)"/>
      </g>

      <!-- Large dashed diamond -->
      <g transform="translate(200,200) rotate(45)">
        <rect x="-140" y="-140" width="280" height="280" fill="none" stroke="#333" stroke-width="1.5" class="dashed-1"/>
      </g>

      <!-- Medium dashed diamond -->
      <g transform="translate(200,200) rotate(45)">
        <rect x="-100" y="-100" width="200" height="200" fill="none" stroke="#333" stroke-width="1.5" class="dashed-2"/>
      </g>

      <!-- Solid inner square -->
      <rect x="100" y="100" width="200" height="200" fill="none" stroke="#333" stroke-width="1"/>

      <!-- Small grid inside -->
      <line x1="150" y1="100" x2="150" y2="300" stroke="#ccc" stroke-width="0.5"/>
      <line x1="200" y1="100" x2="200" y2="300" stroke="#ccc" stroke-width="0.5"/>
      <line x1="250" y1="100" x2="250" y2="300" stroke="#ccc" stroke-width="0.5"/>
      <line x1="100" y1="150" x2="300" y2="150" stroke="#ccc" stroke-width="0.5"/>
      <line x1="100" y1="200" x2="300" y2="200" stroke="#ccc" stroke-width="0.5"/>
      <line x1="100" y1="250" x2="300" y2="250" stroke="#ccc" stroke-width="0.5"/>
    </svg>
  </div>
</div>

</body>
</html>
